version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=axiovital
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  web:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1
      - DB_NAME=axiovital
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "32000:8000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data:
