{% extends 'base.html' %}

{% block title %}Login - AxioVital{% endblock %}

<!-- Override sidebar/main structure for login -->
{% block extra_head %}
<style>
    .sidebar { display: none; }
    .main-content { margin-left: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 0; background-color: #F3F4F6; }
</style>
{% endblock %}

{% block content %}
<div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-gray-100">
    <div class="flex flex-col items-center mb-8">
        <div class="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center text-white mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.285 1.05l-3.293 3.293a1 1 0 01-1.414 0l-3.293-3.293a1 1 0 01-.285-1.05l1.738-5.42-1.233-.616a1 1 0 01.894-1.79l1.599.8L9 4.323V3a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
        <p class="text-sm text-gray-500">Sign in to AxioVital Admin</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
            <input type="text" name="username" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <input type="password" name="password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all" required>
        </div>
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <input type="checkbox" class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                <span class="ml-2 text-xs text-gray-500">Remember me</span>
            </div>
            <a href="#" class="text-xs text-emerald-600 font-medium hover:underline">Forgot password?</a>
        </div>
        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-emerald-200">
            Sign In
        </button>
    </form>
    
    <div class="mt-8 pt-6 border-t border-gray-100 text-center">
        <p class="text-xs text-gray-400">AxioVital Hospital Management System v1.0</p>
    </div>
</div>
{% endblock %}
